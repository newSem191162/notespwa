<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <title>Заметки ✨ АДАПТИВНАЯ ВЕРСИЯ 2.0</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
    }

    /* КРУПНЫЙ ИНДИКАТОР ВЕРСИИ */
    .version-flag {
      position: fixed;
      top: 1px;
      left: 12px;
      background: rgba(40,40,40,0.7);
      backdrop-filter: blur(8px);
      color: #ffd700;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: bold;
      z-index: 1000;
      font-family: monospace;
      border: 1px solid rgba(255,215,0,0.5);
      pointer-events: none;
      margin-top:2px;
    }
    .version-flag::before {
      content: "Версия 0.1.6.5 • ";
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
      background: #f3f4f6;
    }

    /* === САЙДБАР — НОВЫЙ СТИЛЬ === */
    .sidebar {
      width: 360px;
      background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      display: flex;
      flex-direction: column;
      box-shadow: 8px 0 24px rgba(0, 0, 0, 0.15);
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-card {
      padding: 24px 20px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .form-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e0e7ff;
      margin-bottom: 16px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-title::before {
      content: "✨";
      font-size: 1.3rem;
    }

    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      background: rgba(255,255,255,0.95);
      transition: all 0.2s;
      outline: none;
      margin-bottom: 12px;
    }

    input:focus, textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
      background: white;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      margin-top: 6px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    .notes-header {
      padding: 20px 20px 12px 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #9ca3af;
      background: transparent;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 20px 12px;
    }

    /* НОВЫЙ ДИЗАЙН КАРТОЧЕК */
    .note-item {
      padding: 14px 16px;
      margin-bottom: 8px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .note-item:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(4px);
    }

    .note-item.active-note {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border-left: 4px solid #818cf8;
      border-radius: 14px 12px 12px 14px;
    }

    .note-title {
      font-weight: 700;
      font-size: 1rem;
      color: #f3f4f6;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .note-title::before {
      content: "📄";
      font-size: 0.9rem;
    }

    .note-preview {
      font-size: 0.8rem;
      color: #cbd5e1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .note-date {
      font-size: 0.7rem;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ОСНОВНАЯ ОБЛАСТЬ — СВЕТЛАЯ */
    .content-area {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 32px 40px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: #9ca3af;
    }
    .empty-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .note-view {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-view h2 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1f2937, #4b5563);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }

    .view-meta {
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e5e7eb;
      color: #6b7280;
      font-size: 0.85rem;
    }

    .view-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #374151;
      white-space: pre-wrap;
    }

    .delete-note-btn {
      background: #fee2e2;
      color: #dc2626;
      margin-top: 40px;
      width: auto;
      display: inline-flex;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
    }

    /* FAB — ПЛАВАЮЩАЯ КНОПКА ДЛЯ МОБИЛЬНЫХ */
    .fab {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      z-index: 30;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .fab:active {
      transform: scale(0.92);
    }

    /* МОБИЛЬНОЕ МЕНЮ */
    .mobile-menu-btn {
      display: none;
      background: #aa20ff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 4px 16px;
      font-size: 1.2rem;
      cursor: pointer;
      margin-bottom: 16px;
      margin-toз: 4px;
      width: fit-content;
    }
    .overlay {
      display: none;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 280px;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        z-index: 25;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .content-area {
        padding: 20px 18px;
      }
      .mobile-menu-btn {
        display: flex;
      }
      .overlay.show {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 20;
      }
      .fab {
        display: flex;
      }
      .version-flag {
         position: fixed;
        top: 2px;
        left: 12px;
      }
      .note-view h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

function loadAllNotes() {
  if (!db) return;
  const tx = db.transaction(STORE_NAME, "readonly");
  const store = tx.objectStore(STORE_NAME);
  const getAll = store.getAll();
  
  getAll.onsuccess = function(e) {
    let notes = e.target.result;
    notes.sort(function(a, b) {
      return new Date(b.datetime.replace(/(\d+).(\d+).(\d+), (\d+):(\d+):(\d+)/, '$3-$2-$1T$4:$5:$6')) - 
             new Date(a.datetime.replace(/(\d+).(\d+).(\d+), (\d+):(\d+):(\d+)/, '$3-$2-$1T$4:$5:$6'));
    });
    currentNotes = notes;
    renderList(notes);
    
    if (currentNoteId && notes.find(n => n.id === currentNoteId)) {
      showNote(notes.find(n => n.id === currentNoteId));
    } else if (notes.length === 0) {
      showEmpty();
    }
  };
}
  
function renderList(notes) {
  currentNotes = notes;
  renderFilteredList();
}
//=========
  // Фильтрация заметок по поисковому запросу
let currentSearchQuery = "";

function filterNotes(notes, query) {
  if (!query || query.trim() === "") {
    return notes;
  }
  
  const lowerQuery = query.toLowerCase().trim();
  return notes.filter(note => {
    return note.header.toLowerCase().includes(lowerQuery) || 
           note.text.toLowerCase().includes(lowerQuery);
  });
}

function renderFilteredList() {
  if (!currentNotes) return;
  
  let filtered = filterNotes(currentNotes, currentSearchQuery);
  // Сортируем от новых к старым
  filtered.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
  
  const container = document.getElementById("notesList");
  container.innerHTML = "";
  
  if (!filtered.length) {
    container.innerHTML = '<div style="padding:24px;text-align:center;color:#9ca3af;">🔍 Ничего не найдено</div>';
    return;
  }
  
  filtered.forEach(note => {
    const div = document.createElement("div");
    div.className = "note-item";
    if (currentNoteId === note.id) div.classList.add("active-note");
    
    // Подсвечиваем совпадения в заголовке и превью
    const highlightedTitle = highlightText(note.header, currentSearchQuery);
    const previewText = note.text.length > 55 ? note.text.substring(0, 55) + "…" : note.text;
    const highlightedPreview = highlightText(previewText, currentSearchQuery);
    
    div.innerHTML = `
      <div class="note-title">${highlightedTitle}</div>
      <div class="note-preview">${highlightedPreview}</div>
      <div class="note-date">🕐 ${escapeHtml(note.datetime)}</div>
    `;
    div.onclick = () => {
      currentNoteId = note.id;
      showNote(note);
      renderFilteredList(); // обновляем подсветку активной заметки
      closeSidebar();
    };
    container.appendChild(div);
  });
}

// Функция подсветки текста
function highlightText(text, query) {
  if (!query || query.trim() === "") {
    return escapeHtml(text);
  }
  
  const escapedText = escapeHtml(text);
  const escapedQuery = escapeHtml(query.toLowerCase().trim());
  
  // Регулярное выражение для поиска (без учёта регистра)
  const regex = new RegExp(`(${escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escapedText.replace(regex, '<mark style="background: #fef08a; color: #1e293b; border-radius: 4px; padding: 0 2px;">$1</mark>');
}

function showNote(note) {
  const contentDiv = document.getElementById("content");
  contentDiv.innerHTML = `
    <div class="note-view">
      <h2>📌 ${escapeHtml(note.header)}</h2>
      <div class="view-meta">📅 ${escapeHtml(note.datetime)}</div>
      <div class="view-text">${escapeHtml(note.text).replace(/\n/g, '<br>')}</div>
      <div style="display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap;">
        <button class="delete-note-btn" id="delNoteBtn">🗑 Удалить заметку</button>
        <button class="delete-note-btn" id="ntfyBtn" style="background: #e0e7ff; color: #4f46e5;">🔔 Отправить в ntfy</button>
        <button class="delete-note-btn" id="exportOneBtn" style="background: #10b981; color: white;">💾 Экспорт заметки</button>
      </div>
    </div>
  `;
  document.getElementById("delNoteBtn")?.addEventListener("click", () => {
    if (confirm("Удалить?")) deleteNote(note.id);
  });
  document.getElementById("ntfyBtn")?.addEventListener("click", () => {
    sendToNtfy(note);
  });
  document.getElementById("exportOneBtn")?.addEventListener("click", () => {
    exportSingleNote(note);
  });
}

function sendToNtfy(note) {
  const topic = "notealert"; //prompt("Введите тему ntfy (например: mynotes):\n\nБесплатно на ntfy.sh", "my-notes");
  if (!topic) return;
  
  const server = "https://ntfy.sh"; //prompt("Сервер ntfy (оставьте пустым для ntfy.sh):", "https://ntfy.sh");
  const url = server ? `${server}/${topic}` : `https://ntfy.sh/${topic}`;
  
  const message = `${note.header}\n\n${note.text.substring(0, 200)}${note.text.length > 200 ? '…' : ''}`;
  
  fetch(url, {
    method: 'POST',
    body: message,
    headers: {
      'Title': note.header,
      'Tags': 'memo,notebook',
      'Priority': 'default'
    }
  })
  .then(response => {
    if (response.ok) {
      alert(`✅ Отправлено в ${url}`);
    } else {
      alert(`❌ Ошибка: ${response.status}`);
    }
  })
  .catch(err => {
    alert(`❌ Не удалось отправить: ${err.message}`);
  });
}

function exportToJSON() {
  if (!db) {
    alert("База данных не готова");
    return;
  }
  
  const tx = db.transaction(STORE_NAME, "readonly");
  const store = tx.objectStore(STORE_NAME);
  const getAll = store.getAll();
  
  getAll.onsuccess = function() {
    const notes = getAll.result;
    
    if (notes.length === 0) {
      alert("Нет заметок для экспорта");
      return;
    }
    
    const exportData = {
      exportDate: new Date().toLocaleString('ru-RU'),
      totalNotes: notes.length,
      notes: notes.map(note => ({
        id: note.id,
        header: note.header,
        text: note.text,
        datetime: note.datetime
      }))
    };
    
    const jsonStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `notes_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert(`✅ Экспортировано ${notes.length} заметок`);
  };
  
  getAll.onerror = function() {
    alert("Ошибка при чтении базы данных");
  };
}

function exportSingleNote(note) {
  const exportData = {
    exportDate: new Date().toLocaleString('ru-RU'),
    type: "single_note",
    note: {
      id: note.id,
      header: note.header,
      text: note.text,
      datetime: note.datetime
    }
  };
  
  const jsonStr = JSON.stringify(exportData, null, 2);
  const blob = new Blob([jsonStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  // Очищаем заголовок от спецсимволов для имени файла
  const safeHeader = note.header.replace(/[^a-zа-яё0-9]/gi, '_').substring(0, 30);
  a.download = `note_${safeHeader}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  alert(`✅ Заметка "${note.header}" экспортирована`);
}

function importFromJSON() {
  const input = document.getElementById("importFileInput");
  input.click();
  
  input.onchange = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        
        let notesToImport = [];
        let formatDetected = false;
        
        // Проверяем формат массового экспорта: { notes: [...] }
        if (importedData.notes && Array.isArray(importedData.notes)) {
          notesToImport = importedData.notes;
          formatDetected = true;
        }
        // Проверяем формат экспорта одной заметки: { type: "single_note", note: {...} }
        else if (importedData.type === "single_note" && importedData.note) {
          notesToImport = [importedData.note];
          formatDetected = true;
        }
        // Проверяем простой массив: [{...}, {...}]
        else if (Array.isArray(importedData)) {
          notesToImport = importedData;
          formatDetected = true;
        }
        // Проверяем одиночную заметку без обёртки: { header: "...", text: "..." }
        else if (importedData.header && importedData.text) {
          notesToImport = [importedData];
          formatDetected = true;
        }
        
        // Если формат не распознан
        if (!formatDetected) {
          alert("❌ Неверный формат файла. Поддерживаются:\n- Массив заметок\n- Объект с полем 'notes'\n- Экспорт одной заметки\n- Одиночный объект заметки");
          input.value = '';
          return;
        }
        
        if (notesToImport.length === 0) {
          alert("Нет заметок для импорта");
          input.value = '';
          return;
        }
        
        if (confirm(`Найдено ${notesToImport.length} заметок. Импортировать? Существующие заметки останутся.`)) {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);
          
          let imported = 0;
          let errors = 0;
          
          notesToImport.forEach(note => {
            // Проверяем обязательные поля
            if (note.header && note.text) {
              const newNote = {
                header: note.header,
                text: note.text,
                datetime: note.datetime || new Date().toLocaleString('ru-RU')
              };
              
              const request = store.add(newNote);
              request.onsuccess = () => imported++;
              request.onerror = () => errors++;
            } else {
              errors++;
            }
          });
          
          tx.oncomplete = () => {
            if (imported > 0) {
              alert(`✅ Импортировано: ${imported}\n❌ Пропущено (неверный формат): ${errors}`);
              loadAllNotes();
              showEmpty();
            } else {
              alert("❌ Не удалось импортировать ни одной заметки. Проверьте формат файла.");
            }
          };
          
          tx.onerror = () => {
            alert("Ошибка при сохранении в базу данных");
          };
        }
      } catch (err) {
        alert(`❌ Ошибка парсинга JSON: ${err.message}`);
      }
      input.value = '';
    };
    
    reader.onerror = () => {
      alert("Ошибка чтения файла");
      input.value = '';
    };
    
    reader.readAsText(file);
  };
}

document.getElementById("exportJsonBtn").onclick = exportToJSON;
document.getElementById("importJsonBtn").onclick = importFromJSON;

// Поиск с задержкой (debounce)
let searchTimeout;
const searchInput = document.getElementById("searchInput");
if (searchInput) {
  searchInput.addEventListener("input", function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearchQuery = e.target.value;
      renderFilteredList();
      
      // Если текущая открытая заметка не соответствует фильтру, очищаем просмотр
      if (currentNoteId) {
        const stillVisible = filterNotes(currentNotes, currentSearchQuery).some(n => n.id === currentNoteId);
        if (!stillVisible) {
          currentNoteId = null;
          showEmpty();
        }
      }
    }, 300); // задержка 300ms для улучшения производительности
  });
}
//============
  
  function showEmpty() {
    document.getElementById("content").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📘</div>
        <p>Здесь будут ваши заметки</p>
      </div>
    `;
    currentNoteId = null;
  }

  function deleteNote(id) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => {
      if (currentNoteId === id) currentNoteId = null;
      loadAllNotes();
      showEmpty();
    };
  }

  document.getElementById("saveBtn").onclick = () => {
    const header = document.getElementById("header").value.trim();
    const text = document.getElementById("text").value.trim();
    if (!header || !text) return alert("Заполните оба поля");
    const note = {
      datetime: new Date().toLocaleString('ru-RU'),
      header, text
    };
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).add(note);
    tx.oncomplete = () => {
      document.getElementById("header").value = "";
      document.getElementById("text").value = "";
      loadAllNotes();
      closeSidebar();
    };
  };

  function escapeHtml(s) {
    if (!s) return "";
    return s.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // мобильные контролы
  const sidebar = document.getElementById("sidebar");
  const toggle = document.getElementById("menuToggleBtn");
  const overlay = document.getElementById("mobileOverlay");
  const fab = document.getElementById("fabBtn");

  function closeSidebar() {
    if (window.innerWidth <= 768) {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }
  }
  function openSidebar() {
    if (window.innerWidth <= 768) {
      sidebar.classList.add("open");
      overlay.classList.add("show");
    }
  }
  toggle?.addEventListener("click", () => {
    if (sidebar.classList.contains("open")) closeSidebar();
    else openSidebar();
  });
  fab?.addEventListener("click", () => {
    // прокрутить к форме
    document.getElementById("header").scrollIntoView({ behavior: "smooth" });
    if (window.innerWidth <= 768) openSidebar();
  });
  overlay?.addEventListener("click", closeSidebar);
  window.addEventListener("resize", () => {
    if (window.innerWidth > 768) {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/service-worker.js").catch(e => console.log(e));
    });
  }
</script>
